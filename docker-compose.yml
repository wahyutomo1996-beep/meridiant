# ============================================
# Meridiant - Docker Compose Production
# ============================================
services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: meridiant-db
    restart: always
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - meridiant-net

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: meridiant-backend
    restart: always
    env_file:
      - .env.production
    depends_on:
      - mongodb
    networks:
      - meridiant-net

  # React Frontend (served via Nginx)
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        REACT_APP_BACKEND_URL: ${APP_URL}
        REACT_APP_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    container_name: meridiant-frontend
    restart: always
    networks:
      - meridiant-net

  # Nginx Reverse Proxy (SSL Termination)
  nginx:
    image: nginx:alpine
    container_name: meridiant-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx-ssl.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    networks:
      - meridiant-net

volumes:
  mongo_data:

networks:
  meridiant-net:
    driver: bridge
